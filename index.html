<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts (Elegant combo) -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Fallback redirect -->
  <meta http-equiv="refresh" content="3; url=https://the-joint-thesis.github.io/EE-Collective/">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      overflow: hidden;
    }

    .box {
      max-width: 520px;
      padding: 2rem;
      animation: fadeIn 0.8s ease;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 0.4px;
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    p {
      color: #bbb;
      font-size: 0.95rem;
      font-weight: 300;
    }

    a {
      color: #4da6ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* SVG animation */
    .smiley {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      animation: float 2s ease-in-out infinite;
    }

    .smiley circle,
    .smiley path {
      stroke: #4da6ff;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: draw 1.5s ease forwards;
    }

    .smiley path {
      animation-delay: 0.3s;
    }

    /* Loading dots */
    .dots span {
      display: inline-block;
      animation: blink 1.4s infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    /* Animations */
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <script>
    setTimeout(() => {
      window.location.href = "https://the-joint-thesis.github.io/EE-Collective/";
    }, 3000);
  </script>
</head>

<body>
  <div class="box">

    <svg class="smiley" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9"></circle>
      <path d="M8 10h.01M16 10h.01"></path>
      <path d="M8 15c1.5 1.5 6.5 1.5 8 0"></path>
    </svg>

    <h1>We are navigating you to the new experience</h1>

    <p>
      Please wait<span class="dots">
        <span>.</span><span>.</span><span>.</span>
      </span>
    </p>

    <p>
      If you are not redirected,
      <a href="https://the-joint-thesis.github.io/EE-Collective/">click here</a>.
    </p>

  </div>
</body>
</html>
